<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Inventory System</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-5 bg-base-200 min-h-screen">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-primary">Data Inventaris Komputer</h1>
        
        <div class="form-control mb-4">
            <input type="text" id="searchInput" placeholder="Cari aset, user, atau spesifikasi..." class="input input-bordered w-full md:w-1/3" />
        </div>

        <div class="overflow-x-auto bg-base-100 rounded-box shadow-xl">
            <table class="table table-zebra w-full" id="inventoryTable">
                <thead>
                    <tr>
                        <th>ID Aset</th>
                        <th>User</th>
                        <th>Perangkat</th>
                        <th>Spesifikasi</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Data Inventaris (Nanti bisa dipindah ke file data.json terpisah)
        const inventoryData = [
            { id: "PC-001", user: "Admin IT", device: "HP Pavilion x360", specs: "Core i5, 16GB RAM, 512GB SSD", status: "Active" },
            { id: "PC-002", user: "Finance-01", device: "Lenovo ThinkPad", specs: "Core i3, 8GB RAM, 256GB SSD", status: "Active" },
            { id: "PC-003", user: "Designer-01", device: "PC Desktop", specs: "Ryzen 7, 32GB RAM, RTX 3060", status: "Maintenance" },
            { id: "PC-004", user: "Gudang", device: "Dell Latitude", specs: "Core i5, 8GB RAM, 500GB HDD", status: "Broken" }
        ];

        const renderTable = (data) => {
            const tbody = document.getElementById('inventoryBody');
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td class="font-mono font-bold">${item.id}</td>
                    <td>${item.user}</td>
                    <td>${item.device}</td>
                    <td><span class="badge badge-ghost">${item.specs}</span></td>
                    <td><span class="badge ${item.status === 'Active' ? 'badge-success' : item.status === 'Maintenance' ? 'badge-warning' : 'badge-error'} text-white">${item.status}</span></td>
                </tr>
            `).join('');
        };

        // Fungsi Pencarian
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = inventoryData.filter(item => 
                item.user.toLowerCase().includes(keyword) || 
                item.id.toLowerCase().includes(keyword) ||
                item.device.toLowerCase().includes(keyword)
            );
            renderTable(filtered);
        });

        // Tampilkan data awal
        renderTable(inventoryData);
    </script>
</body>
</html>
