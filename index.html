<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Inventory Manager Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

body { 
    font-family: 'Inter', sans-serif; 
    /* GANTI URL DI BAWAH INI DENGAN FOTO PILIHANMU */
    background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=2070');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
}

/* Biar kartu statistik & tabel kelihatan transparan mewah (Glassmorphism) */
.card, .stats, .navbar {
    background-color: rgba(255, 255, 255, 0.85) !important;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.3);
}

.stat { background: transparent !important; }

@media print { 
    .no-print { display: none !important; } 
    body.printing-label .main-content { display: none !important; } 
    body { background-image: none !important; background-color: white !important; }
    canvas, img, svg {
        image-rendering: pixelated !important;
        image-rendering: crisp-edges !important;
    }
}

.print-only-label { display: none; }
@media print { 
    body.printing-label .print-only-label { 
        display: flex !important; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
    } 
}
        /* Sembunyikan tombol-tombol admin untuk role-viewer */
body.role-viewer .btn-hapus, 
body.role-viewer .btn-tambah, 
body.role-viewer .btn-import,
body.role-viewer [onclick*="deleteAsset"],
body.role-viewer .aksi-kolom { 
    display: none !important; 
}
.editable:focus {
    background-color: rgba(100, 26, 230, 0.1); /* Warna highlight ungu tipis pas diklik */
    outline: 2px solid #641ae6;
    border-radius: 4px;
    color: white;
}
        
    </style>
</head>
<body class="bg-base-200 min-h-screen">
    <div id="loginSection" class="flex items-center justify-center min-h-screen no-print">
    <div class="card w-96 bg-white shadow-xl p-8 border border-primary/20">
        <h2 class="text-2xl font-bold text-center mb-6 text-primary">IT ASSET LOGIN</h2>
        <div class="form-control gap-4">
            <input type="email" id="loginEmail" placeholder="Email Admin" class="input input-bordered focus:input-primary" />
            <input type="password" id="loginPassword" placeholder="Password" class="input input-bordered focus:input-primary" />
            <button onclick="handleLogin()" id="btnLogin" class="btn btn-primary text-white">Masuk Sistem</button>
        </div>
        <p id="loginError" class="text-error text-sm mt-4 text-center hidden font-semibold"></p>
    </div>
    </div>

    <div id="print-label-area" class="print-only-label"></div>

    <div class="main-content hidden">
    <div class="navbar bg-primary text-primary-content shadow-lg px-4 md:px-10 no-print">
        <div class="flex-1">
            <a class="text-xl font-bold tracking-tight uppercase text-white">IT-ASSET DASHBOARD</a>
        </div>
        <div class="flex-none flex items-center gap-3">
            <div id="statusConnection" class="badge badge-outline text-white">Terhubung</div>
            <button onclick="handleLogout()" class="btn btn-error btn-xs text-white font-bold px-4">LOGOUT</button>
        </div>
    </div>

        <div class="max-w-6xl mx-auto p-4 md:p-10">
            
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8 no-print">
    <div class="stats shadow">
        <div class="stat p-3">
            <div class="stat-title text-xs">Total Aset</div>
            <div id="totalAset" class="stat-value text-primary text-xl">0</div>
        </div>
    </div>
    
    <div class="stats shadow">
        <div class="stat p-3">
            <div class="stat-title text-xs text-info">Laptop</div>
            <div id="totalLaptop" class="stat-value text-info text-xl">0</div>
        </div>
    </div>

    <div class="stats shadow">
        <div class="stat p-3">
            <div class="stat-title text-xs text-warning">Komputer</div>
            <div id="totalKomputer" class="stat-value text-warning text-xl">0</div>
        </div>
    </div>

    <div class="stats shadow">
        <div class="stat p-3">
            <div class="stat-title text-xs text-success font-bold">Aktif</div>
            <div id="unitAktif" class="stat-value text-success text-xl">0</div>
        </div>
    </div>

    <div class="stats shadow">
        <div class="stat p-3">
            <div class="stat-title text-xs text-error font-bold">Maintenance</div>
            <div id="unitRusak" class="stat-value text-error text-xl">0</div>
        </div>
    </div>
</div>


            <div class="flex flex-wrap gap-2 mb-6 no-print">
                <button onclick="toggleForm()" class="btn btn-primary text-white">+ Tambah Aset</button>
                <button onclick="window.print()" class="btn btn-outline btn-secondary">Cetak Laporan</button>
            </div>

            <div id="formContainer" class="card bg-base-100 shadow-xl mb-8 no-print hidden">
                <div class="card-body">
                    <h2 class="card-title text-primary">Input Aset Baru</h2>
                    <form id="assetForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <div class="form-control">
                            <label class="label"><span class="label-text font-bold">ID Aset</span></label>
                            <input type="text" id="in_id" placeholder="PC-01" class="input input-bordered" required />
                        </div>
                        <div class="form-control">
                            <label class="label"><span class="label-text font-bold">User</span></label>
                            <input type="text" id="in_user" placeholder="Nama User" class="input input-bordered" required />
                        </div>
                        <div class="form-control">
                            <label class="label"><span class="label-text font-bold">Departemen</span></label>
                            <input type="text" id="in_dept" placeholder="Contoh: IT / HR / Produksi" class="input input-bordered" required />
                        </div>
                        <div class="form-control">
                            <label class="label"><span class="label-text font-bold">Perangkat</span></label>
                            <input type="text" id="in_device" placeholder="Laptop/PC" class="input input-bordered" required />
                        </div>
                        <div class="form-control">
                            <label class="label"><span class="label-text font-bold">Spesifikasi</span></label>
                            <input type="text" id="in_specs" placeholder="RAM, CPU" class="input input-bordered" />
                        </div>
                        <div class="form-control">
                            <label class="label"><span class="label-text font-bold">Status</span></label>
                            <select id="in_status" class="select select-bordered">
                                <option value="Active">Active / Aktif</option>
                                <option value="Maintenance">Maintenance</option>
                                <option value="Broken">Broken / Rusak</option>
                            </select>
                        </div>
                        <div class="form-control mt-9">
                            <button type="submit" id="btnSimpan" class="btn btn-primary text-white w-full">Simpan ke Cloud</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="mb-6 no-print">
                <input type="text" id="searchInput" placeholder="Cari nama, ID, atau departemen..." class="input input-bordered w-full max-w-xs focus:input-primary" />
            </div>

            <div class="card bg-base-100 shadow-xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="table table-zebra w-full">
                        <thead>
                            <tr class="bg-base-300 text-center">
                                <th>BARCODE</th>
                                <th>USER</th>
                                <th>DEPT</th>
                                <th>DEVICE</th>
                                <th>STATUS</th>
                                <th class="no-print">AKSI</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryBody">
                            <tr><td colspan="6" class="text-center py-10">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xsqabypdhudqwyeegfci.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzcWFieXBkaHVkcXd5ZWVnZmNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDExNTksImV4cCI6MjA5MTkxNzE1OX0.mv_XCnfHsmC5ve9rm-J0e0U_AxQ-GS6B5sxf_4a-NWM'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        checkUser();

        function toggleForm() {
            document.getElementById('formContainer').classList.toggle('hidden');
        }

        async function fetchData() {
            try {
                const { data, error } = await supabaseClient.from('inventaris').select('*').order('created_at', { ascending: true });
                if (error) throw error;
                document.getElementById('statusConnection').innerText = "Terhubung";
                document.getElementById('statusConnection').className = "badge badge-success text-white font-bold";
                renderTable(data);
                updateStats(data);
            } catch (err) {
                console.error(err);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('inventoryBody');
            tbody.innerHTML = data.map(item => `
                <tr class="hover text-center">
                    <td class="p-2 bg-white">
                        <svg class="barcode mx-auto" jsbarcode-value="${item.id_aset}" jsbarcode-format="code128" jsbarcode-width="1" jsbarcode-height="30" jsbarcode-fontSize="13"></svg>
                    </td>
                    <td class="editable uppercase font-bold" contenteditable="true" onblur="updateField('${item.id}', 'user', this.innerText)">${item.user || '-'}</td>
                    <td class="editable uppercase font-semibold text-primary" contenteditable="true" onblur="updateField('${item.id}', 'dept', this.innerText)">${item.dept || '-'}</td>
                    <td>${item.device || '-'}</td>
                    <td><div class="badge ${getStatusClass(item.status)} border-none text-white font-bold">${item.status || '-'}</div></td>
                    <td class="no-print aksi-kolom flex gap-1 justify-center">
                        <button onclick="printSingleLabel('${item.id_aset}', '${item.user}', '${item.device}')" class="btn btn-ghost btn-xs text-primary">Label</button>
                        <button onclick="deleteAsset('${item.id_aset}')" class="btn btn-ghost btn-xs text-error btn-hapus">Hapus</button>
                    </td>
                </tr>
            `).join('');
            JsBarcode(".barcode").init();
        }
        async function updateField(id, kolom, nilaiBaru) {
    const nilaiClean = nilaiBaru.trim().toUpperCase(); // Biar rapi otomatis huruf besar
    
    const { error } = await supabase
        .from('inventaris') // Pastikan nama tabel di Supabase kamu 'inventaris'
        .update({ [kolom]: nilaiClean })
        .eq('id', id);

    if (error) {
        console.error("Gagal update:", error);
        alert("Gagal simpan perubahan bro!");
    } else {
        console.log("Data berhasil diupdate!");
        // Optional: panggil updateStats() kalau yang diedit mempengaruhi jumlah laptop/pc
    }
}

        function updateStats(data) {
    if (!data) return;

    // 1. Total Semua Aset
    document.getElementById('totalAset').innerText = data.length;

    // 2. Hitung Laptop (Mencari kata 'laptop' di kolom device)
    const jmlLaptop = data.filter(i => 
        i.device && i.device.toLowerCase().includes('laptop')
    ).length;
    document.getElementById('totalLaptop').innerText = jmlLaptop;

    // 3. Hitung Komputer (Mencari kata 'komputer' atau 'pc' di kolom device)
    const jmlPC = data.filter(i => 
        i.device && (i.device.toLowerCase().includes('komputer') || i.device.toLowerCase().includes('pc'))
    ).length;
    document.getElementById('totalKomputer').innerText = jmlPC;

    // 4. Hitung Status Aktif
    const aktif = data.filter(i => {
        const s = i.status ? i.status.toLowerCase() : '';
        return s === 'active' || s === 'aktif';
    }).length;
    document.getElementById('unitAktif').innerText = aktif;

    // 5. Hitung Status Maintenance/Rusak
    const rusak = data.filter(i => {
        const s = i.status ? i.status.toLowerCase() : '';
        return s === 'maintenance' || s === 'broken' || s === 'rusak';
    }).length;
    document.getElementById('unitRusak').innerText = rusak;
}

        function getStatusClass(s) {
            const st = s?.toLowerCase();
            if (st === 'active' || st === 'aktif') return 'bg-success';
            if (st === 'maintenance') return 'bg-warning text-black';
            return 'bg-error';
        }

        document.getElementById('assetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSimpan');
            btn.innerText = "Menyimpan...";
            btn.disabled = true;

            const newData = {
                id_aset: document.getElementById('in_id').value,
                user: document.getElementById('in_user').value,
                dept: document.getElementById('in_dept').value, // KIRIM DATA DEPT
                device: document.getElementById('in_device').value, 
                specs: document.getElementById('in_specs').value,
                status: document.getElementById('in_status').value
            };

            const { error } = await supabaseClient.from('inventaris').insert([newData]);
            
            if (error) {
                alert("Gagal: " + error.message);
            } else {
                e.target.reset();
                fetchData();
                toggleForm();
            }
            btn.innerText = "Simpan ke Cloud";
            btn.disabled = false;
        });

        async function deleteAsset(id) {
            if (confirm(`Hapus aset ${id}?`)) {
                await supabaseClient.from('inventaris').delete().eq('id_aset', id);
                fetchData();
            }
        }

        function printSingleLabel(id, user, device) {
            const printArea = document.getElementById('print-label-area');
            printArea.innerHTML = `
                <div style="padding: 15px; border: 2px solid #000; text-align: center; background: white;">
                    <div style="font-weight: bold; font-family: sans-serif;">ASSET: ${device}</div>
                    <svg id="singleBarcode"></svg>
                    <div style="font-family: sans-serif;">User: ${user}</div>
                </div>
            `;
            JsBarcode("#singleBarcode", id, { format: "code128", width: 3, height: 100 });
            document.body.classList.add('printing-label');
            setTimeout(() => { window.print(); document.body.classList.remove('printing-label'); }, 500);
        }

        document.getElementById('searchInput').addEventListener('input', async (e) => {
            const kw = e.target.value.toLowerCase();
            const { data } = await supabaseClient.from('inventaris').select('*');
            const filtered = data.filter(i => 
                String(i.user).toLowerCase().includes(kw) || 
                String(i.id_aset).toLowerCase().includes(kw) ||
                String(i.dept).toLowerCase().includes(kw)
            );
            renderTable(filtered);
            updateStats(filtered);
        });

        // 1. Fungsi untuk cek status login setiap kali web dibuka
async function checkUser() {
    // 1. Ambil data user yang sedang aktif
    const { data: { user } } = await supabaseClient.auth.getUser();
    const loginSec = document.getElementById('loginSection');
    const mainContent = document.querySelector('.main-content');

    // 2. Mode Default: Selalu buka dashboard agar tamu bisa lihat data
    if (loginSec) loginSec.classList.add('hidden');
    if (mainContent) mainContent.classList.remove('hidden');

    // 3. Logika Hak Akses Super Admin (Hanya untuk Email Andri)
    if (user && user.email === 'andri@panrama.com') {
        // JIKA ADMIN: Hapus pembatas, semua tombol muncul
        document.body.classList.remove('role-viewer');
        console.log("Welcome Super Admin:", user.email);
    } else {
        // JIKA TAMU atau USER BIASA: Pasang pembatas, tombol disembunyikan
        document.body.classList.add('role-viewer');
        console.log("Status: Viewer Mode (Read-Only)");
    }

    // 4. Jalankan ambil data dari Supabase
    fetchData();
}

// 2. Fungsi untuk menangani tombol "Masuk Sistem"
async function handleLogin() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('btnLogin');
    const err = document.getElementById('loginError');

    btn.innerText = "Memverifikasi...";
    err.classList.add('hidden');

    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

    if (error) {
        err.innerText = "Email atau Password Salah!";
        err.classList.remove('hidden');
        btn.innerText = "Masuk Sistem";
    } else {
        checkUser(); // Login sukses, cek ulang status user
        checkSession();
    }
}

// 3. Fungsi untuk tombol Logout
async function handleLogout() {
    // 1. Perintahkan Supabase untuk mengakhiri sesi secara global
    const { error } = await supabaseClient.auth.signOut();
    
    if (error) {
        console.error('Error logging out:', error.message);
        alert("Gagal logout: " + error.message);
    } else {
        // 2. BERSIHKAN TOTAL penyimpanan browser
        // Ini kunci utamanya biar pas refresh nggak login otomatis
        localStorage.clear();
        sessionStorage.clear();

        // 3. Hapus semua cookie Supabase (opsional tapi bagus buat jaga-jaga)
        const cookies = document.cookie.split(";");
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i];
            const eqPos = cookie.indexOf("=");
            const name = eqPos > -1 ? cookie.substr(0, eqPos) : cookie;
            document.cookie = name + "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
        }

        alert("Berhasil keluar! Sesi telah dibersihkan.");

        // 4. Paksa reload ke halaman awal (bukan dashboard)
        // Gunakan replace agar user tidak bisa tekan tombol "Back" untuk masuk lagi
        window.location.replace(window.location.pathname);
    }
}

            // Mencegah Klik Kanan
document.addEventListener('contextmenu', event => event.preventDefault());

// Mencegah Shortcut Keyboard (seperti Ctrl+U, Ctrl+S, Ctrl+Shift+I)
document.onkeydown = function(e) {
    if (e.ctrlKey && 
        (e.keyCode === 67 || // Ctrl+C
         e.keyCode === 86 || // Ctrl+V
         e.keyCode === 85 || // Ctrl+U (View Source)
         e.keyCode === 83 || // Ctrl+S (Save Page)
         e.keyCode === 117)) {
        return false;
    }
};
    </script>

</body>
