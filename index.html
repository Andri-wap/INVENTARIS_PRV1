<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Inventory Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-base-200 min-h-screen">

    <div class="navbar bg-primary text-primary-content shadow-lg px-4 md:px-10">
        <div class="flex-1">
            <a class="text-xl font-bold tracking-tight">IT-ASSET PRV1</a>
        </div>
        <div class="flex-none">
            <div id="statusConnection" class="badge badge-outline">Menghubungkan...</div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-4 md:p-10">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="stats shadow">
                <div class="stat">
                    <div class="stat-title">Total Aset</div>
                    <div id="totalAset" class="stat-value text-primary">0</div>
                </div>
            </div>
            <div class="stats shadow">
                <div class="stat">
                    <div class="stat-title">Unit Aktif</div>
                    <div id="unitAktif" class="stat-value text-success">0</div>
                </div>
            </div>
            <div class="stats shadow">
                <div class="stat">
                    <div class="stat-title">Maintenance</div>
                    <div id="unitRusak" class="stat-value text-error">0</div>
                </div>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div class="form-control w-full md:w-96">
                <div class="input-group">
                    <input type="text" id="searchInput" placeholder="Cari Nama User atau ID Aset..." class="input input-bordered w-full focus:input-primary" />
                </div>
            </div>
            <button onclick="fetchData()" class="btn btn-ghost btn-circle shadow bg-base-100">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
                </svg>
            </button>
        </div>

        <div class="card bg-base-100 shadow-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="table table-zebra w-full">
                    <thead>
                        <tr class="bg-base-300">
                            <th>ID ASET</th>
                            <th>USER / PEMEGANG</th>
                            <th>NAMA PERANGKAT</th>
                            <th>SPESIFIKASI</th>
                            <th>STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryBody">
                        <tr><td colspan="5" class="text-center py-10">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <footer class="mt-10 text-center text-sm opacity-50">
            &copy; 2026 Database Inventaris Komputer - Dikelola via Supabase & GitHub
        </footer>
    </div>

    <script>
        // --- KONFIGURASI SUPABASE (GANTI INI) ---
        const SUPABASE_URL = 'https://xsqabypdhudqwyeegfci.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzcWFieXBkaHVkcXd5ZWVnZmNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDExNTksImV4cCI6MjA5MTkxNzE1OX0.mv_XCnfHsmC5ve9rm-J0e0U_AxQ-GS6B5sxf_4a-NWM';
        // ----------------------------------------

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchData() {
            const statusNode = document.getElementById('statusConnection');
            statusNode.innerText = "Memuat...";
            
            try {
                const { data, error } = await supabaseClient
                    .from('inventaris')
                    .select('*')
                    .order('id_aset', { ascending: true });

                if (error) throw error;

                statusNode.innerText = "Terhubung";
                statusNode.className = "badge badge-success text-white";
                renderTable(data);
                updateStats(data);
            } catch (err) {
                console.error(err);
                statusNode.innerText = "Error Koneksi";
                statusNode.className = "badge badge-error text-white";
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('inventoryBody');
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-gray-400">Belum ada data unit.</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(item => `
                <tr class="hover">
                    <td class="font-mono font-bold text-primary">${item.id_aset || '-'}</td>
                    <td class="font-semibold">${item.user || '-'}</td>
                    <td>${item.device || '-'}</td>
                    <td><div class="text-xs opacity-70 max-w-xs truncate">${item.specs || '-'}</div></td>
                    <td>
                        <div class="badge ${getStatusClass(item.status)} border-none text-white font-semibold">
                            ${item.status || 'Unknown'}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusClass(status) {
            const s = status ? status.toLowerCase() : '';
            if (s === 'active' || s === 'oke') return 'bg-success';
            if (s === 'maintenance' || s === 'perbaikan') return 'bg-warning text-black';
            if (s === 'broken' || s === 'rusak') return 'bg-error';
            return 'bg-slate-400';
        }

        function updateStats(data) {
            document.getElementById('totalAset').innerText = data.length;
            document.getElementById('unitAktif').innerText = data.filter(i => i.status?.toLowerCase() === 'active').length;
            document.getElementById('unitRusak').innerText = data.filter(i => i.status?.toLowerCase() !== 'active').length;
        }

        // Live Search
        document.getElementById('searchInput').addEventListener('input', async (e) => {
            const keyword = e.target.value.toLowerCase();
            const { data } = await supabaseClient.from('inventaris').select('*');
            const filtered = data.filter(item => 
                (item.user && item.user.toLowerCase().includes(keyword)) || 
                (item.id_aset && item.id_aset.toLowerCase().includes(keyword)) ||
                (item.device && item.device.toLowerCase().includes(keyword))
            );
            renderTable(filtered);
        });

        // Jalankan saat start
        fetchData();
    </script>
</body>
</html>
